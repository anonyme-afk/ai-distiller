version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./.env:/app/.env
    environment:
      - ENVIRONMENT=development
    command: uvicorn ai_distiller.api.server:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./.env:/app/.env
    environment:
      - ENVIRONMENT=development
    command: python src/ai_distiller/ui/app.py
